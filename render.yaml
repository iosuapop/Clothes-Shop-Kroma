services:
  # Serviciul principal - Aplicația Laravel
  - type: web
    name: kroma-app
    runtime: php
    plan: free
    buildCommand: |
      composer install --no-interaction --optimize-autoloader
      npm install
      npm run build
      php artisan migrate --force
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=${PORT}
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          type: web
          name: kroma-app
          property: url
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: kroma-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: kroma-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: kroma-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: kroma-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: kroma-db
          property: password
      - key: QUEUE_CONNECTION
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: SCOUT_DRIVER
        value: database
      - key: MAIL_MAILER
        value: log
      - key: STRIPE_KEY
        sync: false
      - key: STRIPE_SECRET
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  # Serviciul Queue Worker (emailuri)
  - type: worker
    name: kroma-worker
    runtime: php
    plan: free
    buildCommand: composer install --no-interaction --optimize-autoloader
    startCommand: php artisan queue:work --tries=3
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        fromService:
          type: web
          name: kroma-app
          envVarKey: APP_KEY
      - key: APP_URL
        fromService:
          type: web
          name: kroma-app
          property: url
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: kroma-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: kroma-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: kroma-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: kroma-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: kroma-db
          property: password
      - key: QUEUE_CONNECTION
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: MAIL_MAILER
        value: log
      - key: STRIPE_KEY
        sync: false
      - key: STRIPE_SECRET
        sync: false
# Baza de date PostgreSQL
databases:
  - name: kroma-db
    plan: free
    databaseName: kroma
    user: kroma_user
